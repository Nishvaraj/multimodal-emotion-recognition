# Model architecture settings used by training/experimentation scripts.
model:
  type: 'fusion'
  # Audio branch configuration for the fusion model.
  audio_model:
    type: 'CNN'
    parameters:
      num_layers: 3
      dropout_rate: 0.5
  # Video branch configuration for the fusion model.
  video_model:
    type: 'CNN'
    parameters:
      num_layers: 3
      dropout_rate: 0.5

# Dataset input/output paths for raw assets and preprocessed artifacts.
data:
  paths:
    raw:
      audio: 'data/raw/audio/'
      video: 'data/raw/video/'
      fer2013: 'data/raw/fer2013/'
      ravdess: 'data/raw/ravdess/'
    processed:
      audio: 'data/processed/audio/'
      video: 'data/processed/video/'

# Core training hyperparameters.
training:
  batch_size: 32
  learning_rate: 0.001
  num_epochs: 50
  optimizer: 'adam'

# Evaluation metrics computed after training.
evaluation:
  metrics:
    - accuracy
    - precision
    - recall
    - f1_score

# Logging/checkpoint output configuration.
logging:
  level: 'info'
  save_dir: 'models/checkpoints/'
