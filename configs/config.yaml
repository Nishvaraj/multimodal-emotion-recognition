model:
  type: 'fusion'
  audio_model:
    type: 'CNN'
    parameters:
      num_layers: 3
      dropout_rate: 0.5
  video_model:
    type: 'CNN'
    parameters:
      num_layers: 3
      dropout_rate: 0.5

data:
  paths:
    raw:
      audio: 'data/raw/audio/'
      video: 'data/raw/video/'
      fer2013: 'data/raw/fer2013/'
      ravdess: 'data/raw/ravdess/'
    processed:
      audio: 'data/processed/audio/'
      video: 'data/processed/video/'

training:
  batch_size: 32
  learning_rate: 0.001
  num_epochs: 50
  optimizer: 'adam'

evaluation:
  metrics:
    - accuracy
    - precision
    - recall
    - f1_score

logging:
  level: 'info'
  save_dir: 'models/checkpoints/'
