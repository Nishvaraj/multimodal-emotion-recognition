[phases.setup]
aptPkgs = ["libxcb1", "libxcb-render0", "libxcb-shm0", "libxcb-xfixes0"]

[phases.install]
cmds = [
  "python -m venv --copies /opt/venv",
  ". /opt/venv/bin/activate && pip install -r requirements.txt",
  ". /opt/venv/bin/activate && pip uninstall -y opencv-python || true",
  ". /opt/venv/bin/activate && pip install opencv-python-headless>=4.10.0 --force-reinstall"
]